name: samsam-baekgwa

services:
  ai:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./services/ai:/app
      - ./model:/model:ro
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  bff:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./services/bff:/app
    environment:
      PORT: 8080
      AI_SERVICE_URL: http://ai:8000
      INSAMTONG_API_BASE_URL: https://insamtong.kr/openapi
      INSAMTONG_API_KEY: ${INSAMTONG_API_KEY:-}
      PUBLIC_DATA_API_KEY: ${PUBLIC_DATA_API_KEY:-}
    command: sh -c "npm install && npm run dev"
    ports:
      - "8080:8080"
    depends_on:
      - ai
